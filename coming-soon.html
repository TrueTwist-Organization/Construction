<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Pannama Elegance</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; position: relative;">
    
    <!-- Background Elements -->
    <div class="bg-noise"></div>
    <div id="custom-spotlight" style="top: 50%; left: 50%;"></div>
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('city_map_bg.jpg') center/cover; opacity: 0.1; z-index: -1;"></div>

    <div class="scene-label antigravity tilt-card" style="padding: 60px; max-width: 600px; background: rgba(10, 10, 15, 0.7); border: 1px solid rgba(212, 168, 83, 0.2); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 10;">
        <span class="pill" style="margin-bottom: 30px; background: var(--gold); color: #000;">PANNAMA ELEGANCE</span>
        <h1 style="font-family: var(--font-display); font-size: clamp(3rem, 6vw, 4.5rem); margin-bottom: 20px; line-height: 1.1;">COMING <br><span style="color: var(--gold);">SOON</span></h1>
        
        <div style="width: 60px; height: 2px; background: var(--gold); margin: 0 auto 30px auto;"></div>
        
        <p style="font-size: 1.1rem; opacity: 0.8; max-width: 500px; margin: 0 auto 40px auto; font-weight: 300; line-height: 1.6;">
            We are meticulously crafting the final details of this extraordinary journey. The full exclusive booking portal and immersive site experience will be unveiled shortly.
        </p>
        
        <button class="header-cta magnetic tilt-card" onclick="window.history.back()" style="padding: 16px 45px; font-size: 1rem;">
            RETURN TO HOME
        </button>
    </div>

</body>
</html>
