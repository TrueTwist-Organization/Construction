<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANNAMA | Client Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="portal.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="glass-card p-5" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-5">
            <a href="../index.html" class="btn btn-outline-light rounded-pill btn-sm mb-4" style="font-size: 0.7rem; opacity: 0.6;"><i class="bi bi-arrow-left me-2"></i> BACK TO HOME</a>
            <h2 class="text-gold" style="font-family: var(--font-heading);">SIGNATURE PORTAL</h2>
            <p class="opacity-50 small">RESIDENT ACCESS ONLY</p>
        </div>
        <form id="loginForm">
            <div class="mb-4">
                <label class="form-label opacity-50 small">CLIENT USER ID</label>
                <input type="text" id="userId" class="form-control bg-black text-white border-secondary" placeholder="Enter your ID" required>
            </div>
            <div class="mb-4">
                <label class="form-label opacity-50 small">ACCESS PASSWORD</label>
                <input type="password" id="password" class="form-control bg-black text-white border-secondary" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-gold w-100 py-3 mt-3">ENTER DASHBOARD</button>
            <div class="text-center mt-4">
                <a href="../index.html" class="small opacity-50 text-decoration-none">Back to Website</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            clientLogin(document.getElementById('userId').value, document.getElementById('password').value);
        };
    </script>
</body>
</html>
