<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANNAMA | Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="glass-card p-5" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-5">
            <a href="../index.html" class="btn btn-outline-light rounded-pill btn-sm mb-4" style="font-size: 0.7rem; opacity: 0.6;"><i class="bi bi-arrow-left me-2"></i> BACK TO HOME</a>
            <h2 class="text-gold" style="font-family: var(--font-heading);">ADMIN PORTAL</h2>
            <p class="opacity-50 small">PANNAMA ELEGANCE MANAGEMENT</p>
        </div>
        <form id="adminLoginForm">
            <div class="mb-4">
                <label class="form-label opacity-50 small">ADMIN USERNAME</label>
                <input type="text" id="adminUser" class="form-control bg-black text-white border-secondary" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <label class="form-label opacity-50 small">PASSWORD</label>
                <input type="password" id="adminPass" class="form-control bg-black text-white border-secondary" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-gold w-100 py-3 mt-3">PROCEED TO DASHBOARD</button>
        </form>
    </div>

    <script>
        document.getElementById('adminLoginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            // Authorized Credentials (Case-Insensitive)
            if(user.toLowerCase() === 'siya021' && pass.toLowerCase() === 'siya021') {
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid Admin Credentials');
            }
        };
    </script>
</body>
</html>
