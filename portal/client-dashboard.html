<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANNAMA | Client Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container-fluid p-0">
        <header class="p-4 d-flex justify-content-between align-items-center border-bottom border-secondary" style="background: #0a0a0f;">
            <div class="nav-logo m-0">PANNAMA <span>CLIENT</span></div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end">
                    <div class="fw-bold" id="client-name-top">Loading...</div>
                    <div class="small opacity-50" id="client-id-top">ID: 000</div>
                </div>
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="p-5">
            <div class="row g-5">
                <div class="col-lg-8">
                    <div class="glass-card p-5 mb-5 overflow-hidden position-relative">
                        <div style="position: absolute; top: 0; right: 0; padding: 20px; font-size: 5rem; opacity: 0.05; font-family: var(--font-heading); pointer-events: none;">PAYMENT</div>
                        <h4 class="text-gold mb-4" style="font-family: var(--font-heading);">INVESTMENT SUMMARY</h4>
                        <div class="row text-center mt-5">
                            <div class="col-md-6 border-end border-secondary">
                                <div class="opacity-50 small mb-1">TOTAL CAPITAL PAID</div>
                                <div class="h1 text-gold fw-bold" id="total-paid">₹0</div>
                            </div>
                            <div class="col-md-6">
                                <div class="opacity-50 small mb-1">PROPERTY STATUS</div>
                                <div class="h1 text-white fw-bold">UNDER DEV</div>
                            </div>
                        </div>
                    </div>

                    <h5 class="mb-4 opacity-50 small letter-spacing-2">TRANSACTION HISTORY</h5>
                    <div class="glass-card">
                        <div class="table-responsive">
                            <table class="table custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>DATE</th>
                                        <th>CYCLE</th>
                                        <th class="text-end">AMOUNT</th>
                                    </tr>
                                </thead>
                                <tbody id="history-body">
                                    <!-- Dynamic -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="glass-card p-4 mb-4">
                        <h6 class="text-gold small mb-3">CONSTRUCTION UPDATES</h6>
                        <div class="d-flex gap-3 mb-4">
                            <div style="width: 4px; background: var(--gold);"></div>
                            <div class="small">
                                <div class="fw-bold">Phase 1 Foundation Complete</div>
                                <div class="opacity-50">Just Now</div>
                            </div>
                        </div>
                        <div class="d-flex gap-3 mb-4">
                            <div style="width: 4px; background: rgba(255,255,255,0.1);"></div>
                            <div class="small">
                                <div class="fw-bold">Smart Elevator Installation</div>
                                <div class="opacity-10">Pending</div>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn btn-gold w-100 py-3 rounded-3 shadow-lg">DOWNLOAD TAX RECEIPT</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const KEYS = { CUSTOMERS: 'pannama_customers_final', CURRENT_CLIENT: 'pannama_current_client' };
        
        const current = JSON.parse(sessionStorage.getItem(KEYS.CURRENT_CLIENT));
        if(!current) location.href = 'client-login.html';

        document.getElementById('client-name-top').innerText = current.name;
        document.getElementById('client-id-top').innerText = 'ID: ' + current.id;
        document.getElementById('total-paid').innerText = '₹' + (current.totalPaid || 0).toLocaleString('en-IN');

        const body = document.getElementById('history-body');
        if(current.history && current.history.length > 0) {
            current.history.forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(h.date).toLocaleDateString()}</td>
                    <td>${h.cycle}</td>
                    <td class="text-end text-gold fw-bold">₹${parseInt(h.amount).toLocaleString('en-IN')}</td>
                `;
                body.appendChild(tr);
            });
        } else {
            body.innerHTML = '<tr><td colspan="3" class="text-center opacity-30 py-5">No transaction history found</td></tr>';
        }

        function logout() {
            sessionStorage.removeItem(KEYS.CURRENT_CLIENT);
            location.href = 'client-login.html';
        }
    </script>
</body>
</html>
