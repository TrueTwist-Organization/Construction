<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANNAMA | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="mobile-nav-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>
    <nav class="sidebar" id="sidebar">
        <div class="nav-logo">PANNAMA <span>ADMIN</span></div>
        <div class="mt-4">
            <a href="admin-dashboard.html" class="nav-item-custom active"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="admin-customers.html" class="nav-item-custom"><i class="bi bi-people-fill"></i> Customers</a>
        </div>
        <div class="mt-auto mb-4">
            <a href="admin-login.html" class="nav-item-custom text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="mb-5">
            <h2 style="color:var(--gold); font-family:var(--font-heading);">OVERVIEW</h2>
            <p class="opacity-50">Operational summary for Pannama Elegance</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="glass-card p-4">
                    <div class="small opacity-50 mb-2">TOTAL CLIENTS</div>
                    <div class="h2 text-gold" id="stat-clients">0</div>
                    <div class="small text-success mt-2"><i class="bi bi-arrow-up"></i> 12% increase</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card p-4">
                    <div class="small opacity-50 mb-2">TOTAL COLLECTIONS</div>
                    <div class="h2 text-gold" id="stat-payments">₹0</div>
                    <div class="small text-success mt-2"><i class="bi bi-arrow-up"></i> 5% this month</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card p-4">
                    <div class="small opacity-50 mb-2">PENDING INSTALMENTS</div>
                    <div class="h2 text-gold">8</div>
                    <div class="small text-danger mt-2"><i class="bi bi-exclamation-circle"></i> View details</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
    <script>
        const STORAGE_KEY = 'pannama_customers_final';
        let customers = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        
        document.getElementById('stat-clients').innerText = customers.length;
        const total = customers.reduce((sum, c) => sum + (c.totalPaid || 0), 0);
        document.getElementById('stat-payments').innerText = '₹' + total.toLocaleString('en-IN');
    </script>
</body>
</html>
